<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAuth Callback</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #161b22;
        }
        .container {
            background: #21262d;
            padding: 60px;
            border-radius: 16px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 600px;
            width: 90%;
            border: 1px solid #30363d;
        }
        .loading {
            color: #8b949e;
            font-size: 20px;
        }
        .redirecting {
            color: #238636;
            font-size: 24px;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Authorization Successful</h2>
        <p class="loading">Processing your authorization...</p>
        <p class="redirecting">Redirecting to dashboard...</p>
    </div>

    <script>
        const ADMIN_EMAIL = 'shdann@gmail.com';
        
        // Extract code and state from URL
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const state = urlParams.get('state');
        
        if (!code) {
            document.querySelector('.loading').textContent = 'Error: No authorization code found in URL.';
            document.body.style.background = '#2d0a0a';
        } else {
            // Store authorization code and email in localStorage
            localStorage.setItem('github_auth_code', code);
            localStorage.setItem('github_auth_email', ADMIN_EMAIL);
            localStorage.setItem('github_auth_timestamp', Date.now());
            
            // Log for debugging
            console.log('GitHub OAuth Code:', code);
            console.log('Admin Email:', ADMIN_EMAIL);
            console.log('Redirecting to dashboard in 2 seconds...');
            
            // Redirect to dashboard after 2 seconds
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 2000);
        }
    </script>
</body>
</html>

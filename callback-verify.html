<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OAuth Callback</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #161b22;
        }
        .container {
            background: #21262d;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 500px;
            width: 90%;
            border: 1px solid #30363d;
        }
        .success {
            color: #238636;
            font-size: 24px;
            margin-bottom: 20px;
        }
        .info {
            color: #8b949e;
            margin-bottom: 20px;
        }
        .token {
            background: #0d1117;
            padding: 15px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 14px;
            word-break: break-all;
            margin: 20px 0;
        }
        .email {
            color: #58a6ff;
            font-family: monospace;
            font-size: 16px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success">✓</div>
        <h1>Authorization Successful</h1>
        <p class="info">You have authorized the AUE-DB bot.</p>
        
        <p><strong>Authorized as:</strong><br>
        <span id="email" class="email">Loading...</span></p>
        
        <p><strong>GitHub Authorization Code:</strong></p>
        <div class="token" id="token">Loading...</div>
        
        <p class="info" style="margin-top: 30px;">
            <em>Code stored in browser localStorage.</em>
        </p>
    </div>

    <script>
        const ADMIN_EMAIL = 'shdann@gmail.com';

        // Extract code and state from URL
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const state = urlParams.get('state');

        if (!code) {
            document.getElementById('email').textContent = 'Error';
            document.getElementById('token').textContent = 'No authorization code found in URL.';
            document.body.style.background = '#2d0a0a';
        } else {
            // Display admin email
            document.getElementById('email').textContent = ADMIN_EMAIL;

            // Display authorization code
            document.getElementById('token').textContent = code;

            // Store code in localStorage
            localStorage.setItem('github_auth_code', code);
            localStorage.setItem('github_auth_timestamp', Date.now());
            
            // Log for debugging
            console.log('GitHub OAuth Code:', code);
            console.log('Admin Email:', ADMIN_EMAIL);
        }
    </script>
</body>
</html>

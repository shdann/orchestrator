id: ops
role: Ops Agent
model: opencode
context_limit: 2048
system_prompt_file: templates/prompts/ops.txt

capabilities:
  - scheduling
  - file_organization
  - workflow_automation
  - reminders
  - log_rotation
  - directory_monitoring
  - script_execution

tools_allowed:
  - file_read
  - file_write
  - file_move
  - file_delete  # requires confirmation flag
  - shell_exec
  - cron_write
  - notify_send
  - memory_read
  - scratchpad_write
  - log_write

routing:
  receives_from: [orchestrator]
  sends_to: [orchestrator]

safety:
  destructive_ops_require_confirm: true
  protected_paths:
    - /home/shdann/openclaw/memory
    - /home/shdann/openclaw/config

output_format: json
output_schema: schemas/ops_result.json

memory:
  scratchpad: true
  long_term: read_only
  project: read_write
  logs: true

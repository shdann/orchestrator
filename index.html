<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Login - GitHub OAuth</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #24292e 0%, #24292e 100%);
        }
        .container {
            background: #161b22;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 400px;
            width: 90%;
            border: 1px solid #30363d;
        }
        h1 {
            color: #f0f6fc;
            margin-bottom: 10px;
        }
        p {
            color: #8b949e;
            margin-bottom: 30px;
        }
        .login-btn {
            display: inline-block;
            padding: 12px 30px;
            background: #238636;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 500;
            transition: all 0.2s;
            border: 1px solid #30363d;
        }
        .login-btn:hover {
            background: #2ea043;
            border-color: #3fb950;
        }
        .powered-by {
            margin-top: 20px;
            color: #8b949e;
            font-size: 12px;
        }
        .powered-by a {
            color: #58a6ff;
            text-decoration: none;
        }
        .admin-badge {
            background: #f0f6fc;
            color: #161b22;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 20px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="admin-badge">🔐 Admin Access Only</div>
        <h1>🤖 Bot Login</h1>
        <p>Sign in with GitHub to access bot interface</p>
        <a href="https://github.com/login/oauth/authorize?client_id=Ov23liF73OkKXlXOOw7I&redirect_uri=https://shdann.github.io/orchestrator/callback-verify.html&scope=read:user%20user:email&state=eyJ1c2VubmFpbCI6InNoZG9vQG1haWlsIn0ifQ==" class="login-btn">
            Sign in with GitHub
        </a>
        <div class="powered-by">
            Powered by <a href="https://audb.duckdns.org">AUE-DB</a>
        </div>
    </div>
</body>
</html>
